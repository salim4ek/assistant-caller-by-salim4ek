services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: assistant-caller:latest
    container_name: assistant-caller
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      APP_PORT: "8080"
      JWT_SECRET: "${JWT_SECRET:-please-change-me-in-production}"
      DB_PATH: "/app/data/app.db"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      VAPID_PUBLIC: "${VAPID_PUBLIC:-}"
      VAPID_PRIVATE: "${VAPID_PRIVATE:-}"
      # VAPID_SUBJECT — контакт оператора: валидный https URL или mailto.
      # НЕ .local-домен: Apple Web Push отвергает такой токен (403 BadJwtToken) — iOS-пуш не дойдёт.
      VAPID_SUBJECT: "${VAPID_SUBJECT:-https://example.com}"
    volumes:
      - appdata:/app/data
      - ./downloads:/app/downloads:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  appdata:
