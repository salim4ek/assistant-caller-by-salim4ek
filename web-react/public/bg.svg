<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#34d399" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="50%" stop-color="#043326"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <g>
    <circle cx="280" cy="220" r="380" fill="url(#orb1)">
      <animate attributeName="cx" values="280;360;280" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="220;280;220" dur="22s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1180" cy="700" r="450" fill="url(#orb2)">
      <animate attributeName="cx" values="1180;1100;1180" dur="26s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="700;620;700" dur="26s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="200" r="280" fill="url(#orb1)" opacity="0.5">
      <animate attributeName="cx" values="900;980;900" dur="30s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Subtle grid pattern overlay -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="180" x2="1440" y2="180"/>
    <line x1="0" y1="360" x2="1440" y2="360"/>
    <line x1="0" y1="540" x2="1440" y2="540"/>
    <line x1="0" y1="720" x2="1440" y2="720"/>
    <line x1="240" y1="0" x2="240" y2="900"/>
    <line x1="480" y1="0" x2="480" y2="900"/>
    <line x1="720" y1="0" x2="720" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>
</svg>
